# swayidle config — reemplaza hypridle (roto con sdbus-cpp 2.3.0)
# timeout en segundos

# Lock screen cuando idle (usa el lock de omarchy)
timeout 240 'omarchy-system-lock'

# Apagar pantallas después de 5 min de inactividad
timeout 300 'omarchy brightness display off' resume 'omarchy brightness display on'

# Antes de suspender: lock sin apagar display
before-sleep 'OMARCHY_LOCK_ONLY=true omarchy-system-lock'

# Nota: after-sleep no soportado por swayidle 1.9.0
# El wake/post-sleep se maneja vía systemd o el propio omarchy
