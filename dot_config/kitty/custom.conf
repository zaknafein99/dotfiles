# ==========================================
# WEZTERM-LIKE VISUAL CONFIGURATION
# ==========================================

# --- Tab Bar ---
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_align           left
tab_bar_min_tabs        2

# Tab styling (Colors are inherited dynamically from the active theme)
active_tab_font_style   bold
inactive_tab_font_style normal

# Tab templates
tab_title_template      " {index}: {title} "
active_tab_title_template " {index}: {title} ◉ "

# --- Cursor & Trails ---
cursor_shape            block
cursor_stop_blinking_after 15.0

# Native Cursor Trails (Kitty 0.35+)
cursor_trail            1
cursor_trail_decay      0.1 0.45
cursor_trail_start_threshold 2

# --- Window Layouts & Aesthetics ---
enabled_layouts         splits,stack
inactive_text_alpha     0.8
window_border_width     1pt
window_padding_width    12

# --- Typography & Rendering (WezTerm Font & Features) ---
font_family      MonaspiceNe Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
disable_ligatures       never
modify_font             cell_height +2px

# Activar ligaduras y sets estilísticos ss01-ss10 para MonaspiceNe
font_features MonaspiceNe_Nerd_Font +calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10

# --- Scrollback Buffer ---
scrollback_lines        10000
scrollback_pager_history_size 128

# --- Mouse & Selection ---
copy_on_select          yes
strip_trailing_spaces   smart

# ==========================================
# KEYBINDINGS & SHORTCUTS (WezTerm-style)
# ==========================================

# --- Tab Management ---
map ctrl+shift+left     previous_tab
map ctrl+shift+right    next_tab
map ctrl+shift+t        new_tab
map ctrl+shift+w        close_tab
map ctrl+shift+alt+t    set_tab_title

# --- Window Splits (WezTerm Layout) ---
# Ctrl+Shift+Alt+H to split horizontally
map ctrl+shift+alt+h    launch --location=hsplit --cwd=current
# Ctrl+Shift+Alt+V to split vertically
map ctrl+shift+alt+v    launch --location=vsplit --cwd=current

# --- Window Zoom (WezTerm Alt+Enter / Maximize Pane) ---
# Toggle zoom of the active window using stack layout
map ctrl+shift+z        toggle_layout stack

# --- Window Navigation ---
map ctrl+shift+alt+left  neighboring_window left
map ctrl+shift+alt+right neighboring_window right
map ctrl+shift+alt+up    neighboring_window up
map ctrl+shift+alt+down  neighboring_window down

# --- Scrollback Search ---
# Map Ctrl+Shift+F to search scrollback buffer (WezTerm search mode)
map ctrl+shift+f        show_scrollback

# --- Session Management (Tmux Integration) ---
# Ctrl+Shift+Alt+A to attach to default tmux session in a new tab
map ctrl+shift+alt+a    launch --type=tab tmux attach
# Ctrl+Shift+Alt+N to create a new tmux session in a new tab
map ctrl+shift+alt+n    launch --type=tab tmux new-session
