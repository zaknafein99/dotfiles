add_newline = true
command_timeout = 500
format = "$custom[$directory$git_branch$git_status]($style)$character"

[character]
error_symbol = "[✗](bold cyan)"
success_symbol = "[❯](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic cyan"

[git_status]
format     = '[$all_status]($style)'
style      = "cyan"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[custom.bash]
command = 'echo " bash"'
when = 'test "$STARSHIP_SHELL" = "bash"'
format = "[$output]($style) "
style = "bold #cba6f7"

[custom.zsh]
command = 'echo " zsh"'
when = 'test "$STARSHIP_SHELL" = "zsh"'
format = "[$output]($style) "
style = "bold #cba6f7"

[custom.fish]
command = 'echo "󰈺 fish"'
when = 'test "$STARSHIP_SHELL" = "fish"'
format = "[$output]($style) "
style = "bold #cba6f7"
